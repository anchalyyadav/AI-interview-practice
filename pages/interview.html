<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Page</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 500px;
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .question-box {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            min-height: 80px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            margin-top: 10px;
            outline: none;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .start {
            background: #22c55e;
            color: white;
        }

        .next {
            background: #3b82f6;
            color: white;
        }

        .submit {
            background: #f59e0b;
            color: white;
        }

        .end {
            background: #ef4444;
            color: white;
        }

        .status {
            text-align: center;
            font-size: 13px;
            color: #cbd5e1;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Interview Session</h2>

        <div class="question-box" id="questionBox">
            Click "Start Interview" to begin
        </div>

        <textarea id="answer" placeholder="Write your answer here..."></textarea>

        <div class="buttons">

            <button class="start" onclick="startInterview()">Start</button>
            <button class="next" onclick="nextQuestion()">Next</button>
            <button class="submit" onclick="goReport()">Submit</button>
            <button class="end" onclick="endInterview()">End</button>

        </div>

        <div class="status" id="status">Not started</div>

    </div>

    <script>
        let questions = [
            "Tell me about yourself?",
            "What are your strengths?",
            "Why should we hire you?",
            "What is your biggest weakness?",
            "Where do you see yourself in 5 years?"
        ];

        let index = 0;

        function startInterview() {
            index = 0;
            document.getElementById("questionBox").innerText = questions[index];
            document.getElementById("status").innerText = "Interview started";
        }

        function nextQuestion() {
            if (index < questions.length - 1) {
                index++;
                document.getElementById("questionBox").innerText = questions[index];
                document.getElementById("answer").value = "";
                document.getElementById("status").innerText = "Next question";
            } else {
                document.getElementById("status").innerText = "No more questions";
            }
        }

        function submitAnswer() {
            let answer = document.getElementById("answer").value;

            if (answer === "") {
                alert("Please write an answer first");
                return;
            }

            alert("Answer submitted!");
            document.getElementById("answer").value = "";
            document.getElementById("status").innerText = "Answer submitted";
        }

        function endInterview() {
            document.getElementById("questionBox").innerText = "Interview Ended";
            document.getElementById("answer").value = "";
            document.getElementById("status").innerText = "Completed";
        }

        function goReport() {
            window.location.href = "report.html";
        }
    </script>

</body>

</html>
