<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 10px 18px;
            background: #ef4444;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .container {
            padding: 40px;
        }

        .welcome {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            color: #cbd5e1;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="card" onclick="openProfile()">
        <h3>Profile</h3>
        <p>View and update your personal details.</p>
    </div>
    </div>

    <div class="container">
        <div class="welcome">Welcome Back 👋</div>
        <div class="subtitle">Here is your project overview</div>

        <div class="cards">
            <div class="card">
                <h3>Profile</h3>
                <p>View and update your personal details.</p>
            </div>

            <div class="card">
                <h3>Projects</h3>
                <p>Manage all your ongoing work here.</p>
            </div>

            <div class="card">
                <h3>Reports</h3>
                <p>Check your performance analytics.</p>
            </div>

            <div class="card">
                <h3>Settings</h3>
                <p>Customize your account preferences.</p>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            window.location.href = "login.html";
        }

        function openProfile() {
            window.location.href = "profile.html";
        }
    </script>

</body>

</html>
