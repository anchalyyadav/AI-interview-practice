<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link rel="stylesheet" href="../css/profile.css">

    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>

<header class="header">

    <h1>👤 My Profile</h1>

</header>

<div class="profile-container">

    <div class="profile-card">

        <img src="../images/profile.png"
             alt="Profile Picture"
             class="profile-img">

        <h2>Anchal yadav</h2>

        <p>anchal@email.com</p>

        <button>Edit Profile</button>

    </div>

    <div class="stats">

        <div class="box">
            <h2>25</h2>
            <p>Total Interviews</p>
        </div>

        <div class="box">
            <h2>85%</h2>
            <p>Average Score</p>
        </div>

        <div class="box">
            <h2>12</h2>
            <p>Certificates</p>
        </div>

    </div>

    <div class="history">

        <h2>Recent Interviews</h2>

        <table>

            <tr>
                <th>Date</th>
                <th>Role</th>
                <th>Score</th>
            </tr>

            <tr>
                <td>20 Jun 2026</td>
                <td>Frontend Developer</td>
                <td>88%</td>
            </tr>

            <tr>
                <td>22 Jun 2026</td>
                <td>Java Developer</td>
                <td>82%</td>
            </tr>

            <tr>
                <td>25 Jun 2026</td>
                <td>HR Interview</td>
                <td>90%</td>
            </tr>

        </table>

    </div>

</div>

<script src="../js/profile.js"></script>


</body>
</html>
