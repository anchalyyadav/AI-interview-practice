<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            width: 380px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #3b82f6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            margin: auto;
        }

        h2 {
            margin-top: 15px;
            font-size: 22px;
        }

        p {
            color: #cbd5e1;
            font-size: 14px;
            margin-top: 5px;
        }

        .info {
            margin-top: 20px;
            text-align: left;
        }

        .info div {
            background: rgba(255, 255, 255, 0.06);
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .back {
            background: #334155;
            color: white;
        }

        .logout {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="profile-card">

        <div class="avatar">U</div>

        <h2>User Profile</h2>
        <p>Welcome to your account</p>

        <div class="info">
            <div>Email: user@example.com</div>
            <div>Status: Active</div>
            <div>Member: Premium</div>
        </div>

        <div class="btn">
            <button class="back" onclick="goDashboard()">Dashboard</button>
            <button onclick="openInterview()">Interview</button>
            <button class="logout" onclick="logout()">Logout</button>
        </div>

    </div>

    <script>
        function goDashboard() {
            window.location.href = "dashboard.html";
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            window.location.href = "login.html";
        }

        function openInterview() {
            window.location.href = "interview.html";
        }
    </script>

</body>

</html>
