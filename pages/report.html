<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Page</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    header h2 {
      font-size: 24px;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      background: #3b82f6;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    .score {
      font-size: 30px;
      font-weight: 700;
      color: #22c55e;
    }

    .status-good {
      color: #22c55e;
      font-weight: 500;
    }

    .status-mid {
      color: #f59e0b;
      font-weight: 500;
    }

    .status-bad {
      color: #ef4444;
      font-weight: 500;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #cbd5e1;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <header>
    <h2>Interview Report</h2>
    <button class="btn" onclick="goDashboard()">Back to Dashboard</button>
  </header>

  <div class="container">

    <div class="card">
      <h3>Total Score</h3>
      <div class="score" id="score">85%</div>
    </div>

    <div class="card">
      <h3>Performance</h3>
      <p class="status-good">Good</p>
    </div>

    <div class="card">
      <h3>Questions Attempted</h3>
      <p>5 / 5</p>
    </div>

    <div class="card">
      <h3>Accuracy</h3>
      <p>Strong Answering Skills</p>
    </div>

    <div class="card">
      <h3>Suggestion</h3>
      <p>Improve communication and confidence level.</p>
    </div>

    <div class="card">
      <h3>Status</h3>
      <p class="status-good">Selected</p>
    </div>

  </div>

  <div class="footer">
    AI Interview System © 2026
  </div>

  <script>
    function goDashboard() {
      window.location.href = "dashboard.html";
    }

    // Optional: dynamic score (future upgrade)
    let score = 85;
    document.getElementById("score").innerText = score + "%";
  </script>

</body>
</html>
